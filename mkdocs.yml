site_name: Ceres
site_description: Static pre-production AI security scanner for models, datasets, RAG, prompts, agents, tools, MCP, and AI supply chain.
site_url: https://duriantaco.github.io/ceres/
site_author: Ceres contributors
repo_url: https://github.com/duriantaco/ceres
repo_name: duriantaco/ceres

theme:
  name: material
  logo: assets/ceres-mark.svg
  favicon: assets/ceres-mark.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: light green
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: light green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
    - toc.follow

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search

extra_css:
  - assets/ceres.css

extra_javascript:
  - assets/structured-data.js

nav:
  - Overview: index.md
  - Get Started:
      - Install and Run: getting-started.md
      - Policy: policy.md
  - Security Coverage:
      - What Ceres Catches: coverage.md
      - Rule Catalog: rules.md
      - Model Security: model-security.md
  - Operations:
      - CI and GitHub Pages: ci.md
      - Real-World Validation: real-world-validation.md
      - Architecture: architecture.md
  - Project Notes:
      - Roadmap: roadmap.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/duriantaco/ceres
